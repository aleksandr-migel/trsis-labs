<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Магазин Игр</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        .form-group { margin-bottom: 10px; }
        input { padding: 5px; margin-right: 10px; }
        button { padding: 5px 15px; cursor: pointer; }
    </style>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>

<div id="app">
    <h1>Управление каталогом игр</h1>

    <div style="border: 1px solid #ccc; padding: 15px; width: max-content;">
        <h3>Добавить новую игру</h3>
        <form @submit.prevent="addGame">
            <div class="form-group">
                Название: <input type="text" v-model="newGame.title" required>
                Разработчик: <input type="text" v-model="newGame.developer" required>
            </div>
            <div class="form-group">
                Цена ($): <input type="number" step="0.01" v-model="newGame.price" required>
                Год выпуска: <input type="number" v-model="newGame.releaseYear" required>
            </div>
            <button type="submit">Добавить игру</button>
        </form>
    </div>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Название</th>
            <th>Разработчик</th>
            <th>Цена</th>
            <th>Год</th>
            <th>Действия</th>
        </tr>
        </thead>
        <tbody>
            <tr v-for="game in games" :key="game.id">
                <td>{{ game.id }}</td>
                <td>{{ game.title }}</td>
                <td>{{ game.developer }}</td>
                <td>${{ game.price }}</td>
                <td>{{ game.releaseYear }}</td>
                <td><button @click="deleteGame(game.id)">Удалить</button></td>
            </tr>
            <tr v-if="games.length === 0">
                <td colspan="6" style="text-align: center;">Игр пока нет</td>
            </tr>
        </tbody>
    </table>
</div>

<script>
    const { createApp, ref, onMounted } = Vue
    const API_URL = '/public/rest/games'

    createApp({
        setup() {
            const games = ref([]);
            const newGame = ref({ title: '', developer: '', price: '', releaseYear: '' })

            const loadGames = async () => {
                const response = await fetch(API_URL)
                games.value = await response.json()
            }

            const addGame = async () => {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newGame.value)
                })

                if (response.ok) {
                    newGame.value = { title: '', developer: '', price: '', releaseYear: '' }
                    loadGames()
                }
            }

            const deleteGame = async (id) => {
                if (!confirm('Вы уверены?')) return
                const response = await fetch(`${API_URL}/${id}`, { method: 'DELETE' })

                if (response.ok) {
                    loadGames()
                }
            }

            onMounted(() => {
                loadGames()
            })

            return {
                games,
                newGame,
                addGame,
                deleteGame
            }
        }
    }).mount('#app')
</script>

</body>
</html>
