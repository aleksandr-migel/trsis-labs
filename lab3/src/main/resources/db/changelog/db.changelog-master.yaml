databaseChangeLog:
  - changeSet:
      id: init-database-games
      author: migel
      preConditions:
        - onFail: HALT
          not:
            tableExists:
              tableName: game
      changes:
        - createTable:
            tableName: game
            columns:
              - column:
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: game_pkey
                  name: game_id
                  type: BIGINT
              - column:
                  constraints:
                    nullable: false
                  name: title
                  type: VARCHAR(255)
              - column:
                  name: developer
                  type: VARCHAR(255)
              - column:
                  name: price
                  type: DOUBLE
              - column:
                  name: release_year
                  type: INT
  - changeSet:
      id: add-initial-games
      author: migel
      changes:
        - insert:
            tableName: game
            columns:
              - column:
                  name: title
                  value: The Witcher 3
              - column:
                  name: developer
                  value: CD Projekt RED
              - column:
                  name: price
                  valueNumeric: 29.99
              - column:
                  name: release_year
                  valueNumeric: 2015
        - insert:
            tableName: game
            columns:
              - column:
                  name: title
                  value: Cyberpunk 2077
              - column:
                  name: developer
                  value: CD Projekt RED
              - column:
                  name: price
                  valueNumeric: 59.99
              - column:
                  name: release_year
                  valueNumeric: 2020